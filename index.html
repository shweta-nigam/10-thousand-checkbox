<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10k checkbox</title>
    <style>
      body {
        color: white;
        padding: 0;
        margin: 0;
        background-color: #0e0b0b;
      }
      .main-container {
        background-color: #2b2929;
      }
      .checkbox {
        background-color: rgb(168, 26, 145);
        height: 40px;
        width: 40px;
        border: 1px dashed powderblue;
        display: block;
        list-style: none;
        cursor: pointer;

        display: flex;
        align-items: center;
        justify-content: center;
      }
      h1 {
        text-align: center;
      }
      #checkboxes {
        display: flex;
        border-color: red;
        flex-wrap: wrap;
        gap: 10px;
        padding: 20px;
        align-items: center;
      }
      .checkbox.checked {
        background-color: rgba(50, 205, 50, 0.856);
        border: 2px solid white;
      }
      .checkbox.checked::after {
        content: "✔";
        color: rgb(168, 26, 145);
        font-size: 30px;
        font-weight: bold;
      }
    </style>
  </head>
   <body>
    <h1>10,000 Checkboxes</h1>

    <ul id="checkboxes"></ul>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();
      const ul = document.getElementById("checkboxes");

      // INITIAL LOAD
      socket.on("init-state", (states) => {
        if (!states) return;

        ul.innerHTML = "";

        // loop through 10k items
        for (let i = 0; i < states.length; i++) {
          const li = document.createElement("li");
          li.className = "checkbox";

          if (states[i]) {
            li.classList.add("checked");
          }

          // click handler
          li.addEventListener("click", () => {
            const isChecked = li.classList.toggle("checked");

            socket.emit("toggle-checkbox", {
              index: i,
              checked: isChecked,
            });
          });

          ul.appendChild(li);
        }
      });

      
      socket.on("update-checkbox", ({ index, checked }) => {
        const boxes = document.querySelectorAll(".checkbox");

        if (!boxes[index]) return;

        if (checked) {
          boxes[index].classList.add("checked");
        } else {
          boxes[index].classList.remove("checked");
        }
      });
    </script>
  </body>
</html>
